<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SABAE - LOGIN</title>
    <link rel="shortcut icon" href="./assets/imagens/logos/sabae.png" type="image/x-icon">
    <link rel="stylesheet" href="./assets/estilos/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<style>
    body {
        background: white;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        padding: 20px;
    }

    .login-container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
    }

    .logo {
        text-align: center;
        margin-bottom: 30px;
    }

    .logo img {
        width: 200px;
        height: auto;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
    }

    input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
        transition: border-color 0.3s;
    }

    input:focus {
        outline: none;
        border-color: #667eea;
    }

    button {
        width: 100%;
        padding: 12px;
        background: rgb(35, 115, 190);
        color: rgb(237, 237, 237);
        border: none;
        border-radius: 5px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
    }

    button:active {
        transform: translateY(0);
    }
</style>

<body>
    <div class="login-container">
        <div class="logo">
            <img src="./assets/imagens/logos/sabae-complet.png" alt="Logo SABAE"
                style="margin-top: -30px; margin-bottom: 20px;">
        </div>
        <div class="sobre" style="font-size: 13px; margin-bottom: 10px; margin-top: -50px; color: #3c3c3c;">
            <p><strong>ℹ Bem-vindo ao SABAE!</strong></p>
            <p>Sistema de Apoio à Busca Ativa Escolar (SABAE). Projetado para facilitar a
                identificação, registro e acompanhamento da frequência dos estudantes.</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="usuario"><i class="ri-user-smile-line"></i> Usuário</label>
                <input type="text" id="usuario" name="usuario" required placeholder="Digite seu usuário">
            </div>

            <div class="form-group">
                <label for="senha"><i class="ri-lock-password-line"></i> Senha</label>
                <input type="password" id="senha" name="senha" required placeholder="Digite sua senha">
            </div>

            <button type="submit">Entrar <i class="ri-arrow-right-line"></i></button>
        </form>
    </div>

    <script src="./assets/lógica/supabase-config.js"></script>
    <script src="./assets/lógica/auth.js"></script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const usuario = document.getElementById('usuario').value.trim();
            const senha = document.getElementById('senha').value;
            const btnEntrar = document.querySelector('button[type="submit"]');

            // Validar campos vazios
            if (!usuario || !senha) {
                alert('Por favor, preencha todos os campos');
                return;
            }

            // Desabilitar botão e mostrar carregamento
            btnEntrar.disabled = true;
            btnEntrar.innerHTML = '<i class="ri-loader-4-line" style="animation: spin 1s linear infinite;"></i> Entrando...';

            // Validar login via Supabase
            const resultado = await validarLogin(usuario, senha);

            if (resultado.sucesso) {
                // Armazenar dados da sessão
                sessionStorage.setItem('usuarioLogado', 'true');
                sessionStorage.setItem('usuario', usuario);

                // Redirecionar para página principal
                window.location.href = 'index.html';
            } else {
                // Mostrar erro
                alert(resultado.mensagem);

                // Reabilitar botão
                btnEntrar.disabled = false;
                btnEntrar.innerHTML = 'Entrar <i class="ri-arrow-right-line"></i>';

                // Limpar senha
                document.getElementById('senha').value = '';
            }
        });
    </script>

    <style>
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
