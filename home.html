    <div class="user-info-bar">

    <main>

            <img src="./assets/imagens/ico/User-library.svg" alt="Registrar Chamadas" class="btn-registrar-icon">

        <a href="./crud.html" class="btn-gerenciar-dados">
            <img src="./assets/imagens/ico/config-aluno.svg" alt="Gerenciar Dados" class="btn-gerenciar-dados-icon">

                    </div>
                    <div class="info-item">

    <script src="./assets/lógica/supabase-config.js"></script>
    <script src="./assets/lógica/auth.js"></script>
    <script src="./assets/lógica/supabase-alunos.js"></script>
    <script src="./assets/lógica/atividades.js"></script>
    <script src="./assets/lógica/script.js"></script>

    <!-- Script para verificar autenticação e atualizar data/hora -->
    <script>
        // Verificar autenticação ao carregar a página
        async function verificarAutenticacaoAoCarregar() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();

                if (!session) {
                    console.log('❌ Usuário não autenticado. Redirecionando para login...');
                    window.location.href = 'login.html';
                    return;
                }

                console.log('✅ Usuário autenticado:', session.user.email);
            } catch (erro) {
                console.error('❌ Erro ao verificar autenticação:', erro);
                window.location.href = 'login.html';
            }
        }

        // Verificar autenticação quando o documento carregar
        window.addEventListener('load', verificarAutenticacaoAoCarregar);

        // Listener para mudanças de autenticação
        supabaseClient.auth.onAuthStateChange((evento, sessao) => {
            if (evento === 'SIGNED_OUT') {
                console.log('Sessão expirada. Redirecionando para login...');
                window.location.href = 'login.html';
            }
        });

        const atividadesContainer = document.getElementById('atividadesContainer');
        const atividadesHeader = document.getElementById('atividadesHeader');
        const atividadesList = document.getElementById('atividadesList');
        const atividadesToggle = document.getElementById('atividadesToggle');

        function alternarAtividades() {
            if (!atividadesContainer || !atividadesHeader || !atividadesList || !atividadesToggle) return;
            const estaExpandido = !atividadesContainer.classList.contains('collapsed');
            atividadesContainer.classList.toggle('collapsed');
            atividadesHeader.setAttribute('aria-expanded', String(!estaExpandido));
            atividadesList.setAttribute('aria-hidden', String(estaExpandido));
            atividadesToggle.setAttribute('aria-label', estaExpandido ? 'Expandir atividades' : 'Recolher atividades');
        }

        if (atividadesHeader) {
            atividadesHeader.addEventListener('click', alternarAtividades);
            atividadesHeader.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    alternarAtividades();
                }
            });
        }
    </script>

    <!-- Script para atualizar data e hora -->
    <script>
        function atualizarDataHora() {
            const agora = new Date();
            const dia = String(agora.getDate()).padStart(2, '0');
            const mes = String(agora.getMonth() + 1).padStart(2, '0');
            const ano = agora.getFullYear();
            const horas = String(agora.getHours()).padStart(2, '0');
            const minutos = String(agora.getMinutes()).padStart(2, '0');

            const dataHora = `${dia}/${mes}/${ano} ${horas}:${minutos}`;
            document.getElementById('headerDateTime').textContent = dataHora;
        }

        function agendarProximaAtualizacao() {
            const agora = new Date();
            // Calcula quantos milissegundos faltam para o próximo segundo
            const proximoSegundo = (1000 - agora.getMilliseconds());

            setTimeout(() => {
                atualizarDataHora();
                // Após a primeira atualização sincronizada, atualiza a cada segundo
                setInterval(atualizarDataHora, 1000);
            }, proximoSegundo);
        }

        // Atualizar ao carregar (sincronizado com o segundo exato)
        agendarProximaAtualizacao();
    </script>

</html>
